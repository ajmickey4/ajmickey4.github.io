        function renderParty(data) {
            $partyDiv.html(`
      <form id="rsvp">
        ${data.guests.map(g => `
          <label>
            <input type="checkbox" name="guest_${g.row}" checked>
            ${g.first} ${g.last}
          </label>
        `).join("")}

        <input name="contact" placeholder="Email or phone" required>
        <button>Submit RSVP</button>
      </form>
    `);

            $("#rsvp").on("submit", function (e) {
                submitRSVP(e, data.partyId);
            });
        }

        function submitRSVP(e, partyId) {
            e.preventDefault();

            const formData = new FormData(e.target);
            const attendance = {};
            const data = {
                action: "submit",
                partyId: partyId,
                origin: window.location.origin
            };

            // Process guests and other fields
            formData.forEach((value, key) => {
                if (key.startsWith("guest_")) {
                    attendance[key.replace("guest_", "")] = true;
                } else {
                    data[key] = value;
                }
            });

            data.attendance = JSON.stringify(attendance);

            $.ajax({
                url: SCRIPT_URL,
                type: "POST",
                data: data,
                headers: { "X-Requested-With": null },
                xhrFields: { withCredentials: false },
                success: function () {
                    $status.text("RSVP saved. Thank you!");
                    $partyDiv.empty();
                },
                error: function (jqXHR, textStatus, errorThrown) {
                    console.error("Error:", textStatus, errorThrown);
                    $status.text("There was a problem saving your RSVP. Please try again.");
                }
            });
        }
    });
