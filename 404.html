<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Page Not Found</title>
    <script>
        var path = window.location.pathname;
        var target = '/general-404.html';
        
        if (path.startsWith('/wedding/')) {
            target = '/wedding/404/';
        }

        fetch(target)
            .then(function(response) { return response.text(); })
            .then(function(html) {
                document.open();
                document.write(html);
                document.close();
            })
            .catch(function(err) {
                console.error('Failed to load 404 page', err);
                document.body.innerHTML = "<h1>404 - Page Not Found</h1>";
            });
    </script>
</head>
<body>
</body>
</html>
