<!doctype html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="/assets/css/wedding-styles.css">

    <link rel="icon" type="image/svg" href="/assets/images/favicon.svg">

    <script src="https://kit.fontawesome.com/36a6f4b1d0.js" crossorigin="anonymous"></script>
</head>
<body>
    <header class="web-header">
        {% include wedding/wedding-navigation.html %}
    </header>
    {% assign url = page.url | split: "/" %}
    {% if url[2] != nil %}
        <div class="header-spacer"></div>
        <div class="web-page">
            <div class="web-body">
                <div class="page-body">
                    {{ content }}
                </div>
            </div>
            <footer class="web-footer">
                {% include wedding/wedding-footer.html %}
            </footer>
            
            <img src="/assets/images/wedding/cactus.png" class="cactus-img">
        </div>
    {% else %}
        <div class="web-page">
            <div class="web-body">
                {{ content }}
            </div>
            <footer class="web-footer">
                {% include wedding/wedding-footer.html %}
            </footer>
            
            <img src="/assets/images/wedding/cactus.png" class="cactus-img">
        </div>
    {% endif %}

    <script src="/assets/js/cactus.js"></script>
</body>
</html>
